name: Docker Build Check

on:
  push:
    tags:
      - '*' 

jobs:
  build-image:
    name: Construir Imagen Docker
    runs-on: ubuntu-latest 

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Ejecutar la construcción de Docker
        run: docker build .